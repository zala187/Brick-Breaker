<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brick Breaker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
body {
  margin: 0;
  background: #1a1a2e;
  font-family: Arial, sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#ui { display: flex; gap: 30px; margin-bottom: 10px; color: #fff; font-size: 16px; }
#ui span { background: rgba(255,255,255,0.1); padding: 5px 16px; border-radius: 20px; }
canvas { border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; display: block; cursor: none; }
#msg { position: absolute; color: #fff; text-align: center; pointer-events: none; }
#msg h2 { font-size: 28px; margin-bottom: 8px; }
#msg p { font-size: 15px; color: #aaa; }
</style>
</head>
<body>

<div id="ui">
  <span>Score: <b id="score">0</b></span>
  <span>Level: <b id="level">1</b></span>
  <span>Lives: <b id="lives">3</b></span>
</div>
<canvas id="c"></canvas>
<div id="msg"><h2 id="mt"></h2><p id="ms"></p></div>
<script>
  const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = Math.min(480, window.innerWidth - 20);
const H = Math.min(600, window.innerHeight - 80);
canvas.width = W; canvas.height = H;
 
const ROWS = 5, COLS = 8;
const BW = (W - 20) / COLS - 6, BH = 22;
const PAD_W = W * 0.22, PAD_H = 12, PAD_Y = H - 40;
const BALL_R = 8;
 
let score=0, lives=3, level=1, gameState='start';
let padX = W/2 - PAD_W/2;
let ball, bricks, speed;
 
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db'];
 
function initLevel() {
  speed = 3.5 + level * 0.5;
  ball = { x: W/2, y: PAD_Y - BALL_R - 2, dx: speed * (Math.random()>0.5?1:-1), dy: -speed, active: false };
  bricks = [];
  for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
    bricks.push({ x: 10 + c*(BW+6), y: 50 + r*(BH+6), w: BW, h: BH, alive: true, color: COLORS[r], hits: level>2 && r===0 ? 2 : 1 });
  }
}
 
function drawPad() {
  const grd = ctx.createLinearGradient(padX, PAD_Y, padX, PAD_Y+PAD_H);
  grd.addColorStop(0,'#74b9ff'); grd.addColorStop(1,'#0984e3');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.roundRect(padX, PAD_Y, PAD_W, PAD_H, 6);
  ctx.fill();
}
 
function drawBall() {
  const grd = ctx.createRadialGradient(ball.x-2, ball.y-2, 1, ball.x, ball.y, BALL_R);
  grd.addColorStop(0,'#fff'); grd.addColorStop(1,'#fdcb6e');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
}
 
function drawBricks() {
  bricks.forEach(b => {
    if(!b.alive) return;
    ctx.fillStyle = b.hits===2 ? '#fff' : b.color;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 4); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(b.x+4, b.y+3, b.w-8, 5);
  });
}
 
function showMsg(title, sub) {
  document.getElementById('mt').textContent = title;
  document.getElementById('ms').textContent = sub;
  document.getElementById('msg').style.display = 'block';
}
function hideMsg() { document.getElementById('msg').style.display = 'none'; }
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lives').textContent = '❤️'.repeat(lives);
}
 
function update() {
  if(gameState !== 'play') return;
  if(!ball.active) { ball.x = padX + PAD_W/2; return; }
 
  ball.x += ball.dx; ball.y += ball.dy;
 
  if(ball.x - BALL_R < 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); }
  if(ball.x + BALL_R > W) { ball.x = W-BALL_R; ball.dx = -Math.abs(ball.dx); }
  if(ball.y - BALL_R < 0) { ball.y = BALL_R; ball.dy = Math.abs(ball.dy); }
 
  if(ball.y + BALL_R >= PAD_Y && ball.y + BALL_R <= PAD_Y+PAD_H+4 && ball.x > padX-4 && ball.x < padX+PAD_W+4) {
    ball.dy = -Math.abs(ball.dy);
    let hit = (ball.x - padX) / PAD_W;
    ball.dx = (hit - 0.5) * speed * 2.5;
    ball.y = PAD_Y - BALL_R - 1;
  }
 
  if(ball.y - BALL_R > H) {
    lives--;
    updateUI();
    if(lives <= 0) { gameState='over'; showMsg('Game Over!', 'Score: ' + score + ' — Press Space or Click to restart'); return; }
    ball.active = false;
    showMsg('Oops! Ball gir gayi', 'Space ya Click karo phir se launch karne ke liye');
    gameState = 'pause';
    return;
  }
 
  let aliveBricks = 0;
  bricks.forEach(b => {
    if(!b.alive) return;
    aliveBricks++;
    if(ball.x+BALL_R > b.x && ball.x-BALL_R < b.x+b.w && ball.y+BALL_R > b.y && ball.y-BALL_R < b.y+b.h) {
      b.hits--;
      if(b.hits <= 0) { b.alive = false; score += 10 * level; updateUI(); }
      const fromLeft = ball.x - (b.x+b.w), fromRight = b.x - ball.x;
      const fromTop = ball.y - (b.y+b.h), fromBottom = b.y - ball.y;
      const minH = Math.min(Math.abs(fromLeft), Math.abs(fromRight));
      const minV = Math.min(Math.abs(fromTop), Math.abs(fromBottom));
      if(minV < minH) ball.dy *= -1; else ball.dx *= -1;
    }
  });
 
  if(aliveBricks === 0) {
    level++; score += 50 * level; updateUI();
    initLevel();
    gameState = 'pause';
    showMsg('Level ' + level + '! 🎉', 'Space ya Click karo agle level ke liye');
  }
}
 
function draw() {
  ctx.clearRect(0,0,W,H);
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a1a2e'); bg.addColorStop(1,'#16213e');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  drawBricks(); drawPad(); drawBall();
}
 
function loop() { update(); draw(); requestAnimationFrame(loop); }
 
function action() {
  if(gameState==='start'||gameState==='over') {
    score=0; lives=3; level=1; updateUI(); initLevel(); hideMsg(); gameState='pause';
    showMsg('Ready!', 'Space ya Click karo launch karne ke liye');
  } else if(gameState==='pause') {
    hideMsg(); gameState='play'; ball.active=true;
  } else if(gameState==='play' && !ball.active) {
    ball.active=true;
  }
}
 
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  padX = e.clientX - r.left - PAD_W/2;
  padX = Math.max(0, Math.min(W-PAD_W, padX));
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  padX = e.touches[0].clientX - r.left - PAD_W/2;
  padX = Math.max(0, Math.min(W-PAD_W, padX));
}, {passive:false});
canvas.addEventListener('click', action);
document.addEventListener('keydown', e => {
  if(e.code==='Space') { e.preventDefault(); action(); }
  if(e.code==='ArrowLeft') padX = Math.max(0, padX-20);
  if(e.code==='ArrowRight') padX = Math.min(W-PAD_W, padX+20);
});
 
initLevel();
gameState = 'start';
showMsg('Brick Breaker 🎮', 'Space ya Click karo shuru karne ke liye');
updateUI();
loop();
</script>
</body>
</html>
